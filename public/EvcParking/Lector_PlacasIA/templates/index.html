<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EVC Parking — Lector de Placas (Local)</title>
  <link rel="icon" href="{{ url_for('static', filename='Img/evcblanco.png') }}" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='evc-local.css') }}">
  <style>
    @keyframes scan-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(40,167,69,.7); }
      70%  { box-shadow: 0 0 0 10px rgba(40,167,69,0); }
      100% { box-shadow: 0 0 0 0 rgba(40,167,69,0); }
    }
    .cam-preview-wrap.scanning { outline:3px solid #28a745; outline-offset:2px; animation:scan-pulse 1.5s infinite; }
    .cam-preview-wrap.detected { outline:4px solid #F8A71C !important; animation:none !important; }
    #autoScanBtn { font-size:.82rem; font-weight:600; border-radius:50px; padding:.4rem 1.1rem; }
    #autoScanBtn.on  { background:#28a745; border-color:#28a745; color:#fff; }
    #autoScanBtn.off { background:transparent; border:1.5px solid #28a745; color:#28a745; }
    #autoScanBtn.on:hover  { background:#218838; }
    #autoScanBtn.off:hover { background:rgba(40,167,69,.1); }
    #scanStatus { font-size:.75rem; }
    .detection-row { cursor:pointer; transition:background .15s; }
    .detection-row:hover { background:rgba(248,167,28,.07); }
    .det-thumb { width:52px; height:36px; object-fit:cover; border-radius:4px; border:1px solid #e2e8f0; }
    .det-thumb-empty { width:52px; height:36px; background:#f1f5f9; border-radius:4px; display:flex; align-items:center; justify-content:center; color:#aaa; font-size:.65rem; border:1px solid #e2e8f0; }
    #photoModalImg { max-width:100%; border-radius:8px; }
    .modal-plate-badge { font-size:1.6rem; font-weight:800; letter-spacing:2px; background:#1E2A39; color:#F8A71C; border-radius:8px; padding:.3rem 1.2rem; display:inline-block; margin-bottom:1rem; }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
      <a class="navbar-brand" href="/">
        <img src="{{ url_for('static', filename='Img/evcblanco.png') }}" alt="EVC Parking">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-1">
          <li class="nav-item"><a class="nav-link active" href="/"><i class="fa-solid fa-camera me-1"></i>Camara</a></li>
          <li class="nav-item"><a class="nav-link" href="/placas"><i class="fa-solid fa-list me-1"></i>Registros</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <header class="hero-section hero-sm">
    <div class="container">
      <h1><i class="fa-solid fa-camera me-2"></i>Lector de Placas</h1>
      <p>Deteccion automatica - Webcam PC y camara movil</p>
    </div>
  </header>

  <main class="container py-4">
    <div class="row g-4">

      <!-- Camera column -->
      <div class="col-lg-5">
        <div class="card h-100">
          <div class="card-header cam-header d-flex align-items-center justify-content-between">
            <span><i class="fa-solid fa-camera-retro me-2"></i>Captura</span>
            <span id="scanStatus" class="badge bg-secondary">Manual</span>
          </div>
          <div class="card-body p-3 d-flex flex-column">

            <div id="webcamWrap" class="cam-preview-wrap mb-3">
              <img id="webcamFeed" src="/video_feed" class="cam-video" alt="Webcam">
              <div class="cam-overlay-label">
                <i class="fa-solid fa-circle text-danger cam-rec-dot"></i> Webcam en vivo
              </div>
            </div>

            <div class="cam-file-wrap mb-3">
              <label for="mobileFile" class="cam-file-label-sm">
                <i class="fa-solid fa-mobile-screen-button me-2"></i>Captura desde el telefono
              </label>
              <input type="file" id="mobileFile" accept="image/*" capture="environment" class="d-none">
              <div id="mobilePreviewWrap" style="display:none;" class="cam-preview-wrap mt-2">
                <img id="mobilePreview" class="cam-video" alt="Preview">
              </div>
            </div>

            <div id="loadingWrap" class="text-center py-2" style="display:none;">
              <div class="cam-spinner mx-auto"></div>
              <p class="text-muted mt-2 mb-0" style="font-size:.82rem;">Analizando...</p>
            </div>

            <div id="errorWrap" class="alert cam-alert-danger" style="display:none;">
              <i class="fa-solid fa-triangle-exclamation me-1"></i>
              <span id="errorMsg">Error</span>
            </div>

            <div class="mt-auto d-flex flex-column gap-2 pt-2">
              <button id="autoScanBtn" class="btn off" onclick="toggleAutoScan()">
                <i class="fa-solid fa-rotate me-2"></i>Activar deteccion automatica
              </button>
              <div class="d-flex gap-2">
                <button id="captureWebcam" class="btn cam-capture-btn flex-fill" onclick="captureWebcam()">
                  <i class="fa-solid fa-circle-dot me-2"></i>Capturar
                </button>
                <button id="analyzeMobile" class="btn cam-btn-secondary flex-fill" onclick="analyzeMobile()" disabled>
                  <i class="fa-solid fa-mobile-screen-button me-1"></i>Analizar foto
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Result + history column -->
      <div class="col-lg-7 d-flex flex-column gap-4">

        <div class="card" id="resultCard" style="display:none;">
          <div class="card-header cam-header">
            <i class="fa-solid fa-circle-check me-2"></i>Ultima Deteccion
          </div>
          <div class="card-body p-3 d-flex gap-3 align-items-center flex-wrap">
            <div id="resultThumbWrap" style="display:none;">
              <img id="resultThumb" src="" alt="Placa" style="width:120px;height:80px;object-fit:cover;border-radius:8px;border:2px solid #F8A71C;cursor:pointer;">
            </div>
            <div class="flex-fill text-center">
              <div class="plate-display" id="plateDisplay">---</div>
              <div class="d-flex justify-content-center gap-2 flex-wrap mt-2">
                <span class="cam-detail-pill" id="confDisplay">-</span>
                <span class="cam-detail-pill" id="typeDisplay">-</span>
                <span class="cam-detail-pill" id="tsDisplay">-</span>
              </div>
            </div>
          </div>
        </div>

        <div class="card flex-grow-1">
          <div class="card-header cam-header d-flex align-items-center justify-content-between">
            <span><i class="fa-solid fa-list me-2"></i>Detecciones Recientes</span>
            <span class="cam-live-badge"><i class="fa-solid fa-circle me-1"></i>Live</span>
          </div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table cam-table mb-0">
                <thead>
                  <tr>
                    <th style="width:64px;">Foto</th>
                    <th>Placa</th>
                    <th>Confianza</th>
                    <th>Tipo</th>
                    <th>Hora</th>
                  </tr>
                </thead>
                <tbody id="detectionsBody">
                  <tr id="emptyRow">
                    <td colspan="5" class="text-center text-muted py-4" style="font-size:.85rem;">
                      Esperando detecciones...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Photo modal -->
  <div class="modal fade" id="photoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content" style="background:#1A2535;border:none;border-radius:14px;">
        <div class="modal-header border-0 pb-0">
          <div id="photoModalPlate" class="modal-plate-badge"></div>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body pt-2 text-center">
          <img id="photoModalImg" src="" alt="Foto de placa">
          <p id="photoModalInfo" class="text-muted mt-2 mb-0" style="font-size:.8rem;"></p>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p><i class="fa-regular fa-copyright me-1"></i>2026 EVC Parking - Servidor local</p>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey:            "AIzaSyD5oOWKwiuvlnhGSPm4pXmcHPZKNqQfVEU",
      authDomain:        "evc-parking.firebaseapp.com",
      projectId:         "evc-parking",
      storageBucket:     "evc-parking.firebasestorage.app",
      messagingSenderId: "989995637427",
      appId:             "1:989995637427:web:9cfa55a507d4ded9046ec6"
    });
    const db = firebase.firestore();

    let autoInterval  = null;
    let isLoading     = false;
    let lastPlate     = null;
    let lastPlateTime = 0;
    const COOLDOWN_MS   = 15000;
    const SCAN_INTERVAL = 3000;

    function toggleAutoScan() {
      if (autoInterval) {
        clearInterval(autoInterval);
        autoInterval = null;
        document.getElementById('autoScanBtn').className = 'btn off';
        document.getElementById('autoScanBtn').innerHTML = '<i class="fa-solid fa-rotate me-2"></i>Activar deteccion automatica';
        document.getElementById('webcamWrap').classList.remove('scanning', 'detected');
        document.getElementById('scanStatus').className   = 'badge bg-secondary';
        document.getElementById('scanStatus').textContent = 'Manual';
      } else {
        autoInterval = setInterval(autoScanStep, SCAN_INTERVAL);
        document.getElementById('autoScanBtn').className = 'btn on';
        document.getElementById('autoScanBtn').innerHTML = '<i class="fa-solid fa-stop me-2"></i>Detener deteccion automatica';
        document.getElementById('webcamWrap').classList.add('scanning');
        document.getElementById('scanStatus').className   = 'badge bg-success';
        document.getElementById('scanStatus').textContent = 'Auto-scan activo';
        autoScanStep();
      }
    }

    async function autoScanStep() {
      if (isLoading) return;
      hideError();
      setLoading(true);
      try {
        const res  = await fetch('/leer_placa', { method: 'POST' });
        const data = await res.json();
        setLoading(false);
        if (data.success) {
          const now = Date.now();
          const dup = data.plate === lastPlate && (now - lastPlateTime) < COOLDOWN_MS;
          if (!dup) {
            lastPlate = data.plate;
            lastPlateTime = now;
            await saveAndShow(data);
            flashDetected();
          }
        }
      } catch { setLoading(false); }
    }

    function flashDetected() {
      const w = document.getElementById('webcamWrap');
      w.classList.remove('scanning');
      w.classList.add('detected');
      setTimeout(function() {
        w.classList.remove('detected');
        if (autoInterval) w.classList.add('scanning');
      }, 1500);
    }

    document.getElementById('mobileFile').addEventListener('change', function() {
      const file = this.files[0];
      if (!file) return;
      document.getElementById('mobilePreview').src = URL.createObjectURL(file);
      document.getElementById('mobilePreviewWrap').style.display = 'block';
      document.getElementById('analyzeMobile').disabled = false;
    });

    async function captureWebcam() {
      hideError(); setLoading(true);
      try {
        const res  = await fetch('/leer_placa', { method: 'POST' });
        const data = await res.json();
        setLoading(false);
        if (data.success) {
          lastPlate = data.plate; lastPlateTime = Date.now();
          await saveAndShow(data);
        } else { showError(data.message || 'No se detecto ninguna placa.'); }
      } catch { setLoading(false); showError('Error de conexion con el servidor local.'); }
    }

    async function analyzeMobile() {
      const file = document.getElementById('mobileFile').files[0];
      if (!file) return;
      hideError(); setLoading(true);
      const fd = new FormData();
      fd.append('image', file);
      try {
        const res  = await fetch('/leer_placa_upload', { method: 'POST', body: fd });
        const data = await res.json();
        setLoading(false);
        if (data.success) await saveAndShow(data);
        else showError(data.message || 'No se detecto ninguna placa.');
      } catch { setLoading(false); showError('Error al enviar la imagen.'); }
    }

    async function saveAndShow(data) {
      try {
        await db.collection('plateDetections').add({
          plate: data.plate,
          confidence: data.confidence,
          vehicleType: data.vehicleType || null,
          region: data.region || null,
          image: data.image || null,
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
      } catch(e) { console.warn('Firestore:', e); }

      document.getElementById('plateDisplay').textContent = data.plate;
      document.getElementById('confDisplay').innerHTML    = '<i class="fa-solid fa-gauge me-1"></i>' + data.confidence + '% confianza';
      document.getElementById('typeDisplay').innerHTML    = '<i class="fa-solid fa-car me-1"></i>' + (data.vehicleType || '-');
      document.getElementById('tsDisplay').innerHTML      = '<i class="fa-solid fa-clock me-1"></i>' + new Date().toLocaleTimeString('es-CO');
      document.getElementById('resultCard').style.display = 'block';

      if (data.image) {
        const t = document.getElementById('resultThumb');
        t.src = data.image;
        t.onclick = function() { openPhotoModal(data.image, data.plate, data.confidence, data.vehicleType); };
        document.getElementById('resultThumbWrap').style.display = 'block';
      } else {
        document.getElementById('resultThumbWrap').style.display = 'none';
      }
    }

    db.collection('plateDetections').orderBy('timestamp', 'desc').limit(30).onSnapshot(function(snap) {
      const tbody = document.getElementById('detectionsBody');
      if (snap.empty) { document.getElementById('emptyRow').style.display = ''; return; }
      document.getElementById('emptyRow').style.display = 'none';
      tbody.innerHTML = snap.docs.map(function(doc) {
        const d   = doc.data();
        const ts  = d.timestamp ? d.timestamp.toDate() : null;
        const t   = ts ? ts.toLocaleTimeString('es-CO', {hour:'2-digit',minute:'2-digit',second:'2-digit'}) : '-';
        const c   = d.confidence || 0;
        const cls = c >= 85 ? 'high' : c >= 65 ? 'medium' : 'low';
        const thumb = d.image
          ? '<img class="det-thumb" src="' + d.image + '" alt="" loading="lazy">'
          : '<div class="det-thumb-empty"><i class="fa-solid fa-image"></i></div>';
        const imgAttr = d.image ? ' data-img="' + d.image + '"' : '';
        return '<tr class="detection-row"' + imgAttr
          + ' data-plate="' + (d.plate||'') + '" data-conf="' + c
          + '" data-type="' + (d.vehicleType||'') + '" data-time="' + t + '" onclick="onRowClick(this)">'
          + '<td>' + thumb + '</td>'
          + '<td><span class="cam-plate-cell">' + (d.plate||'-') + '</span></td>'
          + '<td><span class="cam-confidence ' + cls + '">' + c + '%</span></td>'
          + '<td style="font-size:.8rem;color:#718096;">' + (d.vehicleType||'-') + '</td>'
          + '<td style="font-size:.8rem;color:#718096;">' + t + '</td></tr>';
      }).join('');
    });

    function onRowClick(row) {
      const img = row.getAttribute('data-img');
      if (!img) return;
      openPhotoModal(img, row.getAttribute('data-plate'), row.getAttribute('data-conf'), row.getAttribute('data-type'), row.getAttribute('data-time'));
    }

    function openPhotoModal(img, plate, conf, type, time) {
      document.getElementById('photoModalImg').src = img || '';
      document.getElementById('photoModalPlate').textContent = plate || '-';
      document.getElementById('photoModalInfo').textContent  = [conf ? conf+'% confianza' : null, type||null, time||null].filter(Boolean).join(' - ');
      new bootstrap.Modal(document.getElementById('photoModal')).show();
    }

    function setLoading(on) {
      isLoading = on;
      document.getElementById('loadingWrap').style.display = on ? 'block' : 'none';
      document.getElementById('captureWebcam').disabled    = on;
      const mf = document.getElementById('mobileFile');
      document.getElementById('analyzeMobile').disabled   = on || !mf.files.length;
    }
    function showError(msg) {
      document.getElementById('errorMsg').textContent    = msg;
      document.getElementById('errorWrap').style.display = 'block';
      setTimeout(function() { document.getElementById('errorWrap').style.display = 'none'; }, 6000);
    }
    function hideError() { document.getElementById('errorWrap').style.display = 'none'; }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
