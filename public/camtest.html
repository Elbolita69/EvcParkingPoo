<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Cámara</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      font-family: system-ui, sans-serif;
      color: #fff;
      padding: 1rem;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      letter-spacing: .5px;
      opacity: .85;
    }

    #camBox {
      position: relative;
      width: 100%;
      max-width: 480px;
      aspect-ratio: 4/3;
      background: #1a1f2a;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid rgba(248,167,28,.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      border-radius: 14px;
    }

    #placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .75rem;
      text-align: center;
      padding: 1.5rem;
    }

    #camIcon {
      font-size: 3rem;
      opacity: .5;
    }

    #statusText {
      font-size: .9rem;
      opacity: .65;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(248,167,28,.2);
      border-top-color: #F8A71C;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #activateBtn {
      margin-top: 1.5rem;
      width: 100%;
      max-width: 480px;
      padding: .85rem;
      background: linear-gradient(135deg, #E8491D, #F8A71C);
      border: none;
      border-radius: 50px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .3px;
      box-shadow: 0 4px 16px rgba(232,73,29,.4);
      transition: opacity .2s, transform .2s;
    }

    #activateBtn:hover   { opacity: .9; transform: translateY(-2px); }
    #activateBtn:active  { transform: scale(.97); }
    #activateBtn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    #errorBox {
      display: none;
      margin-top: 1rem;
      width: 100%;
      max-width: 480px;
      background: rgba(220,53,69,.12);
      border: 1px solid rgba(220,53,69,.3);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      font-size: .85rem;
      color: #f77;
      line-height: 1.5;
    }

    #liveTag {
      display: none;
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(4px);
      border-radius: 50px;
      padding: .25rem .75rem;
      font-size: .72rem;
      font-weight: 700;
      align-items: center;
      gap: .4rem;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #dc3545;
      animation: blink 1.2s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }
  </style>
</head>
<body>

  <h1>📷 Test de Cámara en Vivo</h1>

  <div id="camBox">
    <div id="placeholder">
      <div id="camIcon">📷</div>
      <div class="spinner" id="spinner"></div>
      <span id="statusText">Toca "Activar cámara" para comenzar</span>
    </div>

    <video id="camVideo" autoplay playsinline muted></video>

    <div id="liveTag">
      <div class="dot"></div> En vivo
    </div>
  </div>

  <button id="activateBtn">📷 Activar cámara</button>

  <div id="errorBox"></div>

  <script>
    const video       = document.getElementById('camVideo');
    const placeholder = document.getElementById('placeholder');
    const spinner     = document.getElementById('spinner');
    const statusText  = document.getElementById('statusText');
    const camIcon     = document.getElementById('camIcon');
    const activateBtn = document.getElementById('activateBtn');
    const errorBox    = document.getElementById('errorBox');
    const liveTag     = document.getElementById('liveTag');

    function showSpinner() {
      camIcon.style.display  = 'none';
      spinner.style.display  = 'block';
      statusText.textContent = 'Solicitando permiso...';
      activateBtn.disabled   = true;
      activateBtn.textContent = '⏳ Conectando...';
    }

    function showLive() {
      placeholder.style.display = 'none';
      video.style.display       = 'block';
      liveTag.style.display     = 'flex';
      activateBtn.style.display = 'none';
      errorBox.style.display    = 'none';
    }

    function showError(msg) {
      spinner.style.display  = 'none';
      camIcon.style.display  = '';
      camIcon.textContent    = '🚫';
      statusText.textContent = 'Acceso denegado';
      activateBtn.disabled   = false;
      activateBtn.textContent = '🔄 Reintentar';
      errorBox.style.display  = 'block';
      errorBox.innerHTML      = msg;
    }

    activateBtn.addEventListener('click', async () => {
      showSpinner();

      const constraints = [
        { video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } } },
        { video: { facingMode: { ideal: 'environment' } } },
        { video: { facingMode: 'environment' } },
        { video: true }
      ];

      let stream = null;

      for (const config of constraints) {
        try {
          stream = await navigator.mediaDevices.getUserMedia(config);
          break;
        } catch (e) {
          if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') {
            showError(`
              <strong>Permiso de cámara bloqueado.</strong><br><br>
              Para habilitarlo:<br>
              • Toca el ícono 🔒 o ⓘ en la barra de direcciones<br>
              • Selecciona <em>Permisos del sitio</em><br>
              • Cambia <em>Cámara</em> de Bloqueado a Permitir<br>
              • Recarga la página
            `);
            return;
          }
        }
      }

      if (!stream) {
        showError('<strong>No se pudo acceder a la cámara.</strong><br>Asegúrate de usar Chrome o Firefox y que el sitio esté en HTTPS.');
        return;
      }

      video.srcObject = stream;
      try { await video.play(); } catch {}
      showLive();
    });
  </script>

</body>
</html>
